<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>DevPrism | LaTeX Writing Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        /* App is locked to dark; splash is always dark to match. */
        background: #0a0a0a;
        color: #fafafa;
        z-index: 9999;
        font-family: 'Geist', system-ui, sans-serif;
        transition: opacity 0.3s ease;
      }
      #loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #333;
        border-top-color: #fafafa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 16px;
      }
      #loading-screen p {
        font-size: 14px;
        color: #737373;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Splash renders before the bundle/globals.css; honor Reduce Motion here too */
      @media (prefers-reduced-motion: reduce) {
        #loading-spinner { animation: none !important; }
      }
    </style>
  </head>
  <body class="h-full antialiased">
    <div id="loading-screen">
      <img
        src="/icon-192.png"
        alt="DevPrism"
        width="64"
        height="64"
        style="margin-bottom: 20px"
      />
      <div id="loading-spinner"></div>
      <p>Loading DevPrism...</p>
    </div>
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
